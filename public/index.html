<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor de Firma Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Quill (WYSIWYG) -->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
</head>
<body>
  <header>
    <h1>🖋️ Editor de Firma Corporativa</h1>
  </header>
  <main>
    <section class="tabs">
      <button class="tab-btn active" data-tab="signature">Firma HTML</button>
      <button class="tab-btn" data-tab="pdf">PDF Adjunto</button>
    </section>
    <section id="signature" class="tab-content active">
      <div id="editor" class="ql-container ql-snow"></div>
      <button id="saveSignature" class="primary-btn">Guardar Firma</button>
    </section>
    <section id="pdf" class="tab-content">
      <input type="file" id="pdfInput" accept="application/pdf" />
      <button id="uploadPdf" class="primary-btn">Subir PDF</button>
      <p id="pdfStatus"></p>
    </section>
  </main>
  <footer>
    <p>© 2026 Empresa X – Todos los derechos reservados.</p>
  </footer>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="js/wysiwyg.js"></script>
  <script src="js/pdfUploader.js"></script>
</body>
</html>
